function fetchEEXPrice() {
  var now = new Date();
  var start = now.toISOString().slice(0,10) + 'T00:00Z';
  var end = now.toISOString().slice(0,10) + 'T23:59Z';
  var url = 'https://api.energy-charts.info/price?bzn=DE-LU&start=' + start + '&end=' + end;
  fetch(url, {signal: AbortSignal.timeout(8000)})
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data) {
      if (!data.price || data.price.length === 0) return;
      // Get the most recent non-null price
      var prices = data.price.filter(function(p) { return p !== null; });
      if (prices.length === 0) return;
      var latest = prices[prices.length - 1];
      var avg = prices.reduce(function(a, b) { return a + b; }, 0) / prices.length;
      var displayPrice = Math.round(latest);
      var fri27 = 74; // Friday Feb 27 baseline
      var pctChg = ((displayPrice - fri27) / fri27 * 100).toFixed(1);
      var sign = pctChg >= 0 ? '+' : '';
      // Update the KPI object
      KPI.forEach(function(k) {
        if (k.l === 'EU Power (EEX)') {
          k.v = '€' + displayPrice;
          k.c = sign + pctChg + '%';
          k.d = pctChg >= 0 ? 'up' : 'dn';
          k.r = 'Fri 27: €74/MWh';
        }
      });
      renderKPIs();
    })
    .catch(function() { /* Keep static value */ });
}

function classifyArticle(title) {
  var tl = title.toLowerCase();
  if (tl.match(/strike|attack|war|bomb|missile|drone|military|conflict|nuclear|weapon|sanction|blockade|block|halt|shut|close/)) return 'cr';
  if (tl.match(/surge|spike|jump|soar|rally|high|record|risk|warn|threat|crisis|disrupt|suspend/)) return 'hi';
  return 'ne';
}

function formatNewsTime(isoDate) {
  if (!isoDate) return '';
  var d = new Date(isoDate);
  var now = new Date();
  var diff = Math.floor((now - d) / 60000); // minutes
  if (diff < 60) return diff + 'm ago';
  if (diff < 1440) return Math.floor(diff/60) + 'h ago';
  return d.toLocaleDateString('en-GB', {month:'short', day:'numeric'});
}

// Fetch live news from our Vercel API proxy (or fallback CORS proxy)
function fetchLiveNews(){
  var queries=['Strait Hormuz oil Iran tanker','oil price OPEC crude Iran war','Iran Israel conflict energy','crude oil shipping disruption Middle East'];
  var ts=Date.now(),allArticles=[],completed=0;
  queries.forEach(function(q){
    var rssUrl='https://news.google.com/rss/search?q='+encodeURIComponent(q)+'&hl=en&gl=US&ceid=US:en&_t='+ts;
    var urls=['/api/news?q='+encodeURIComponent(q)+'&num=20&_t='+ts,'https://corsproxy.io/?'+encodeURIComponent(rssUrl),'https://thingproxy.freeboard.io/fetch/'+rssUrl,'https://api.allorigins.win/raw?url='+encodeURIComponent(rssUrl)];
    function tryU(i){
      if(i>=urls.length){completed++;finN();return}
      var c=new AbortController();var t=setTimeout(function(){c.abort()},5000);
      fetch(urls[i],{signal:c.signal}).then(function(r){clearTimeout(t);if(!r.ok)throw 0;var ct=r.headers.get('content-type')||'';return ct.indexOf('json')>=0?r.json().then(function(d){return{t:'j',d:d}}):r.text().then(function(t){return{t:'x',d:t}})}).then(function(res){
        var arts=[];
        if(res.t==='j'&&res.d.articles)arts=res.d.articles;
        else if(res.t==='x'){var re2=/<item>([\s\S]*?)<\/item>/g,m;while((m=re2.exec(res.d))!==null&&arts.length<20){var ix=m[1],ti=exTag(ix,'title'),li=exTag(ix,'link'),pd=exTag(ix,'pubDate'),sr=exTag(ix,'source');if(ti)arts.push({title:ti,link:li,pubDate:pd,source:sr||'Google News',timestamp:pd?new Date(pd).toISOString():null})}}
        arts.forEach(function(a){if(!allArticles.some(function(x){return x.title===a.title}))allArticles.push(a)});
        completed++;finN();
      }).catch(function(){tryU(i+1)});
    }
    tryU(0);
  });
  function finN(){
    if(completed<queries.length)return;
    if(allArticles.length>0){
      allArticles.sort(function(a,b){return new Date(b.timestamp||0)-new Date(a.timestamp||0)});
      var items=allArticles.slice(0,30).map(function(a){return{t:formatNewsTime(a.timestamp||a.pubDate),h:a.title,s:a.source,sv:classifyArticle(a.title),url:a.link||''}});
      ['nf1','nf2','nf3'].forEach(function(id){var el=document.getElementById(id);if(el)el.innerHTML=renderNewsItems(items)});
      updateNewsStatus('live \u00b7 '+allArticles.length+' articles \u00b7 refresh 2min');
      liveNewsLoaded=true;
    } else {updateNewsStatus('static (live unavailable)')}
  }
}
function exTag(xml,tag){var m=new RegExp('<'+tag+'[^>]*><!\\[CDATA\\[([\\s\\S]*?)\\]\\]></'+tag+'>').exec(xml);if(m)return m[1].trim().replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');m=new RegExp('<'+tag+'[^>]*>([\\s\\S]*?)</'+tag+'>').exec(xml);return m?m[1].trim().replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"'):''}
function updateNewsStatus(msg){var now=new Date(),ts=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');['nf1-status','nf2-status','nf3-status'].forEach(function(id){var el=document.getElementById(id);if(el){el.textContent=msg+(msg.indexOf('live')>=0?' \u00b7 '+ts:'');el.style.color=msg.indexOf('live')>=0?'var(--g)':'var(--txl)'}})}

function drawBrentHistory(){
  var el=document.getElementById('brentHistChart');if(!el)return;el.innerHTML='';

  var data=[
    // 2018

    // 2020 (COVID)
    ["2020-01",64.2,0.5],["2020-04",26.6,8.5],["2020-07",43.2,3.2],["2020-10",42.1,1.5],

    ["2021-01",55.3,-0.5],["2021-04",66.7,-1.8],["2021-07",74.4,-1.5],["2021-10",83.5,-0.8],

    ["2022-01",86.5,-1.0],["2022-03",117.3,-2.5],["2022-06",113.9,-1.8],["2022-09",89.8,-0.3],["2022-12",80.9,0.5],
    // 2023
    ["2023-03",79.3,0.8],["2023-06",75.7,0.5],["2023-09",93.3,-1.2],["2023-12",77.6,0.3],
    // 2024
    ["2024-03",83.4,-0.5],["2024-06",81.5,-0.2],["2024-09",73.2,1.0],["2024-12",73.5,0.8],
    // 2025
    ["2025-03",71.2,1.2],["2025-06",64.8,1.5],["2025-09",62.5,1.0],["2025-12",68.3,0.3],
    // 2026
    ["2026-01",69.5,0.1],["2026-02",72.0,-0.2],["2026-03",81.2,-13.1],
  ];
  var W=el.clientWidth||900,H=320,mg={t:25,r:60,b:40,l:60};
  var w=W-mg.l-mg.r,h=H-mg.t-mg.b;
  var svg=d3.select(el).append('svg').attr('width',W).attr('height',H);
  var g=svg.append('g').attr('transform','translate('+mg.l+','+mg.t+')');
  var xScale=d3.scaleBand().domain(data.map(function(d){return d[0]})).range([0,w]).padding(0.2);
  var yPrice=d3.scaleLinear().domain([0,130]).range([h,0]);
  var yBal=d3.scaleLinear().domain([-14,10]).range([h,0]);
  var zero=yBal(0);
  // Grid
  [20,40,60,80,100,120].forEach(function(v){g.append('line').attr('x1',0).attr('x2',w).attr('y1',yPrice(v)).attr('y2',yPrice(v)).attr('stroke','#1A2E2C').attr('stroke-width',.5)});
  // Bars (surplus/deficit)
  data.forEach(function(d){
    var x=xScale(d[0]),bw=xScale.bandwidth(),val=d[2];
    var barH=Math.abs(val)/14*h*0.4;
    var col=val<0?'rgba(212,59,47,.5)':'rgba(0,133,124,.35)';
    if(d[0]==='2026-03')col='rgba(212,59,47,.8)';
    g.append('rect').attr('x',x).attr('y',val<0?zero:zero-barH).attr('width',bw).attr('height',barH).attr('fill',col).attr('rx',2);
  });
  // Price line
  var line=d3.line().x(function(d){return xScale(d[0])+xScale.bandwidth()/2}).y(function(d){return yPrice(d[1])}).curve(d3.curveMonotoneX);
  g.append('path').datum(data).attr('d',line).attr('fill','none').attr('stroke','var(--acc)').attr('stroke-width',2.5);
  // Price dots
  data.forEach(function(d){g.append('circle').attr('cx',xScale(d[0])+xScale.bandwidth()/2).attr('cy',yPrice(d[1])).attr('r',d[0]==='2026-03'?4:2).attr('fill',d[0]==='2026-03'?'var(--red)':'var(--acc)')});
  // Annotations
  g.append('text').attr('x',xScale('2022-03')+xScale.bandwidth()/2).attr('y',yPrice(117.3)-10).attr('text-anchor','middle').attr('fill','var(--acc)').attr('font-size','11px').attr('font-weight','700').text('Ukraine $117');
  g.append('text').attr('x',xScale('2020-04')+xScale.bandwidth()/2).attr('y',yPrice(26.6)+16).attr('text-anchor','middle').attr('fill','var(--txl)').attr('font-size','10px').text('COVID $27');
  g.append('text').attr('x',xScale('2026-03')+xScale.bandwidth()/2).attr('y',yPrice(81.2)-10).attr('text-anchor','middle').attr('fill','var(--red)').attr('font-size','11px').attr('font-weight','700').text('Hormuz $81');
  // Axes
  g.append('g').attr('transform','translate(0,'+h+')').call(d3.axisBottom(xScale).tickValues(data.filter(function(d,i){return i%4===0}).map(function(d){return d[0]})).tickFormat(function(d){return d.slice(2,7)})).selectAll('text').attr('fill','var(--txl)').attr('font-size','10px').attr('transform','rotate(-30)').attr('text-anchor','end');
  g.selectAll('.domain,.tick line').attr('stroke','#1A2E2C');
  // Y axes
  g.append('g').call(d3.axisLeft(yPrice).ticks(5).tickFormat(function(d){return '$'+d})).selectAll('text').attr('fill','var(--acc)').attr('font-size','11px');
  g.append('text').attr('x',-10).attr('y',-8).attr('fill','var(--acc)').attr('font-size','11px').attr('font-weight','600').text('Brent $/bbl');
  g.append('g').attr('transform','translate('+w+',0)').call(d3.axisRight(yBal).ticks(5).tickFormat(function(d){return(d>0?'+':'')+d+'M'})).selectAll('text').attr('fill','var(--txl)').attr('font-size','10px');
  g.append('text').attr('x',w+10).attr('y',-8).attr('fill','var(--txl)').attr('font-size','10px').text('Surplus/Deficit');
  // Zero line
  g.append('line').attr('x1',0).attr('x2',w).attr('y1',zero).attr('y2',zero).attr('stroke','var(--txl)').attr('stroke-width',1).attr('stroke-dasharray','3,3');
}

  var W=el.clientWidth||800,H=360,mg={t:10,r:130,b:10,l:110},w=W-mg.l-mg.r,h=H-mg.t-mg.b;
  var svg=d3.select('#sankey').append('svg').attr('width',W).attr('height',H);
  var g=svg.append('g').attr('transform','translate('+mg.l+','+mg.t+')');
  var N=[{n:"Saudi Arabia",c:"#2ECC71"},{n:"Iraq",c:"#E67E22"},{n:"UAE",c:"#3498DB"},{n:"Kuwait",c:"#9B59B6"},{n:"Qatar",c:"#1ABC9C"},{n:"Iran",c:"#E74C3C"},{n:"HORMUZ",c:"#FF6B35"},{n:"China",c:"#E74C3C"},{n:"India",c:"#F39C12"},{n:"Japan",c:"#ECF0F1"},{n:"S.Korea",c:"#3498DB"},{n:"EU",c:"#2980B9"},{n:"USA",c:"#27AE60"},{n:"SE Asia",c:"#8E44AD"},{n:"Other",c:"#7F8C8D"}];
  var L=[{s:0,t:6,v:5.5},{s:1,t:6,v:3.3},{s:2,t:6,v:2.5},{s:3,t:6,v:1.7},{s:4,t:6,v:3.0},{s:5,t:6,v:1.5},{s:6,t:7,v:4.8},{s:6,t:8,v:3.2},{s:6,t:9,v:2.5},{s:6,t:10,v:2.0},{s:6,t:11,v:1.5},{s:6,t:12,v:0.5},{s:6,t:13,v:1.5},{s:6,t:14,v:1.5}];
  var P=[0,1,2,3,4,5],D=[7,8,9,10,11,12,13,14],nw=16,np=6;
  var tP=0;L.forEach(function(l){if(P.indexOf(l.s)>=0)tP+=l.v});
  var sP=(h-(P.length-1)*np)/tP,pos={},y=0;
  P.forEach(function(i){var v=0;L.forEach(function(l){if(l.s===i)v+=l.v});var nh=v*sP;pos[i]={x:0,y:y,h:nh,v:v};y+=nh+np});
  pos[6]={x:w/2-nw/2,y:0,h:h,v:tP};y=0;
  var sD=(h-(D.length-1)*np)/tP;
  D.forEach(function(i){var v=0;L.forEach(function(l){if(l.t===i)v+=l.v});var nh=v*sD;pos[i]={x:w,y:y,h:nh,v:v};y+=nh+np});
  var sO={},tO={};for(var k in pos){sO[k]=pos[k].y;tO[k]=pos[k].y}
  L.forEach(function(l){var s=pos[l.s],t=pos[l.t],sH=(l.v/s.v)*s.h,tH=(l.v/t.v)*t.h,sy=sO[l.s],ty=tO[l.t],x0=s.x+nw,x1=t.x,mx=(x0+x1)/2;var p=d3.path();p.moveTo(x0,sy);p.bezierCurveTo(mx,sy,mx,ty,x1,ty);p.lineTo(x1,ty+tH);p.bezierCurveTo(mx,ty+tH,mx,sy+sH,x0,sy+sH);p.closePath();var c=l.s===6?N[l.t].c:N[l.s].c;g.append('path').attr('d',p.toString()).attr('fill',c).attr('fill-opacity',.2).attr('stroke',c).attr('stroke-opacity',.35).attr('stroke-width',.5);sO[l.s]+=sH;tO[l.t]+=tH});
  for(var idx in pos){var i=+idx,p=pos[idx],n=N[i],isH=i===6;g.append('rect').attr('x',p.x).attr('y',p.y).attr('width',nw).attr('height',p.h).attr('fill',isH?'#FF6B35':n.c).attr('rx',isH?4:2).attr('opacity',.85);if(isH){g.append('text').attr('x',p.x+nw/2).attr('y',p.y+p.h/2-12).attr('text-anchor','middle').attr('fill','#FF6B35').attr('font-size','10px').attr('font-weight','800').text('HORMUZ');g.append('text').attr('x',p.x+nw/2).attr('y',p.y+p.h/2+4).attr('text-anchor','middle').attr('fill','#D43B2F').attr('font-size','9px').attr('font-weight','700').text('~70% BLOCKED')}else{var isL=p.x===0,isR=p.x===w;g.append('text').attr('x',isL?-8:isR?p.x+nw+8:p.x+nw/2).attr('y',p.y+p.h/2).attr('dy','.35em').attr('text-anchor',isL?'end':isR?'start':'middle').attr('fill','#8FABA8').attr('font-size','10px').attr('font-weight','500').text(n.n+' ('+p.v.toFixed(1)+')')}}
}
setTimeout(drawSankey,300);
window.addEventListener('resize',function(){if(document.getElementById('t-oil').classList.contains('on'))drawOilSankey();if(document.getElementById('t-gas').classList.contains('on'))drawGasCharts()});
</script>
